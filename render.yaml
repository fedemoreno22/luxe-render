services:
  - type: web
    name: luxe-barber-studio
    runtime: static
    buildCommand: echo "ok"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: redirect
        source: /admin
        destination: /admin/login.html
        permanent: false
      - type: redirect
        source: /admin/
        destination: /admin/login.html
        permanent: false
